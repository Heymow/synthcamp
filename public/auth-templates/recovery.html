<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Reset your SynthCamp password</title>
  </head>
  <body style="margin:0;padding:0;background:#050507;">
    <div style="background:#050507;color:#d4d4d8;font-family:Georgia,serif;font-size:15px;line-height:1.65;padding:40px 32px;max-width:560px;margin:0 auto;">
      <p style="font-family:Arial,sans-serif;font-size:13px;letter-spacing:0.35em;font-weight:900;font-style:italic;text-transform:uppercase;color:#ffffff;margin:0 0 28px;">SynthCamp</p>
      <p style="font-family:Arial,sans-serif;font-size:10px;letter-spacing:0.3em;font-weight:900;text-transform:uppercase;color:#a5b4fc;margin:0 0 24px;">Reset your password</p>
      <p>Hey,</p>
      <p>You requested a password reset. Tap the link below to set a new one. It's valid for one hour.</p>
      <p><a href="{{ .ConfirmationURL }}" style="color:#a5b4fc;word-break:break-all;">{{ .ConfirmationURL }}</a></p>
      <p style="margin-top:32px;font-size:12px;color:#6b7280;">If you didn't request this, you can safely ignore this email. Your password stays unchanged.</p>
      <p style="margin-top:36px;color:#6b7280;font-size:13px;">The SynthCamp team</p>
    </div>
  </body>
</html>
